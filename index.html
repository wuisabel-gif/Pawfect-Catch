<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <title>Milo's Treat Rush</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at 50% 0%, #1f3750 0%, #121e2e 60%, #0d1420 100%);
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #game-host {
        position: relative;
        width: 100%;
        max-width: 440px;
        aspect-ratio: 360 / 640;
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        border-radius: 14px;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.42);
      }
    </style>
  </head>
  <body>
    <div id="game-host" aria-label="Puppy game">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
